<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>Parfüm Koleksiyonu</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0b;
      --surface: #111114;
      --border: #2a2a30;
      --border-light: #3a3a44;
      --gold: #c9a84c;
      --text: #e8e4dc;
      --muted: #7a7880;
      --hover-bg: #1a1a20;
      --stripe: #0e0e12;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      padding: 48px 24px;
    }
    .header { text-align: center; margin-bottom: 52px; }
    .header::before {
      content: '';
      display: block;
      width: 1px; height: 48px;
      background: linear-gradient(to bottom, transparent, var(--gold));
      margin: 0 auto 24px;
    }
    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 300;
      letter-spacing: 0.15em;
      margin-bottom: 8px;
    }
    .header h1 em { font-style: italic; color: var(--gold); }
    .header p { color: var(--muted); font-size: 0.78rem; letter-spacing: 0.25em; text-transform: uppercase; }
    .header::after {
      content: '';
      display: block;
      width: 80px; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      margin: 20px auto 0;
    }
    .controls {
      max-width: 980px;
      margin: 0 auto 28px;
      display: flex; gap: 12px; align-items: center;
    }
    .search-wrap { position: relative; flex: 1; }
    .search-wrap svg {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    #searchInput {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-size: 0.85rem; font-weight: 300;
      padding: 10px 16px 10px 40px;
      outline: none; letter-spacing: 0.05em;
      transition: border-color 0.2s;
    }
    #searchInput::placeholder { color: var(--muted); }
    #searchInput:focus { border-color: var(--gold); }
    .count-badge { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.1em; white-space: nowrap; }
    .count-badge span { color: var(--gold); font-weight: 500; }
    .table-wrap {
      max-width: 980px; margin: 0 auto;
      border: 1px solid var(--border); overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: var(--surface); border-bottom: 1px solid var(--border-light); }
    thead th {
      font-size: 0.63rem; font-weight: 500;
      letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--gold); padding: 13px 14px; text-align: left;
    }
    thead th:first-child  { width: 44px;  text-align: center; }
    thead th:nth-child(2) { width: 76px;  text-align: center; }
    thead th:last-child   { width: 108px; text-align: center; }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      
    }
    tbody tr:nth-child(even) { background: var(--stripe); }
    tbody tr:hover { background: var(--hover-bg); }
    tbody tr:last-child { border-bottom: none; }
       td { padding: 8px 14px; vertical-align: middle; }
    td:first-child {
      text-align: center; color: var(--muted);
      font-size: 0.72rem; letter-spacing: 0.05em; width: 44px;
    }
    td.img-cell { width: 76px; text-align: center; padding: 5px 8px; }
    .perf-img-wrap {
      width: 50px; height: 66px;
      margin: 0 auto;
      background: #15151a;
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.25s;
    }
    tbody tr:hover .perf-img-wrap { border-color: var(--gold); }
    .perf-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
      display: block;
      transition: transform 0.35s ease;
    }
    tbody tr:hover .perf-img-wrap img { transform: scale(1.08); }
    .img-ph {
      font-size: 0.55rem; color: var(--border-light);
      letter-spacing: 0.05em; line-height: 1.4;
      padding: 4px; text-align: center;
    }
    .brand {
      color: var(--muted); font-size: 0.68rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      display: block; margin-bottom: 2px;
    }
    .name {
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem; font-weight: 400; letter-spacing: 0.02em;
    }
    td:last-child { text-align: center; width: 108px; }
    .link-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 11px;
      font-size: 0.67rem; font-weight: 500;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--gold); text-decoration: none;
      border: 1px solid var(--gold);
      transition: all 0.2s;
    }
    .link-btn:hover { background: var(--gold); color: var(--bg); }
    .no-link { font-size: 0.7rem; color: var(--border-light); }
    .no-results {
      text-align: center; padding: 48px 20px;
      color: var(--muted); font-size: 0.9rem; display: none;
    }
    .footer {
      max-width: 980px; margin: 22px auto 0;
      display: flex; align-items: center; justify-content: space-between; padding: 0 4px;
    }
    .footer p { font-size: 0.7rem; color: var(--border-light); letter-spacing: 0.1em; }
    .corrected-badge {
      font-size: 0.65rem; color: var(--gold);
      border: 1px solid var(--gold); padding: 2px 8px;
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    @media(max-width:600px) {
      body { padding: 28px 10px; }
      td { padding: 7px 9px; }
      .perf-img-wrap { width: 42px; height: 56px; }
    }
  </style>
</head>

<body>

  <header class="header">
    <h1>Parfüm <em>Koleksiyonu</em></h1>
    <p>Fragrantica Referans Listesi</p>
  </header>

  <div class="controls">
    <div class="search-wrap">

        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.35-4.35" />
      </svg>
      <input type="text" id="searchInput" placeholder="Marka veya parfüm adı ara…">
    </div>
    <div class="count-badge"><span id="visibleCount">53</span> ürün</div>
  </div>

  <div class="table-wrap">

  <footer class="footer">

      { no: 49, brand: "Xerjoff",            name: "Apollonia",                       link: "https://www.fragrantica.com/perfume/Xerjoff/Apollonia-55970.html" },
      { no: 50, brand: "Xerjoff",            name: "Naxos",                           link: "https://www.fragrantica.com/perfume/Xerjoff/XJ-1861-Naxos-30529.html" },
      { no: 51, brand: "YSL",                name: "Black Opium",                     link: "https://www.fragrantica.com/perfume/Yves-Saint-Laurent/Black-Opium-25324.html" },
      { no: 52, brand: "YSL",                name: "Libre",                           link: "https://www.fragrantica.com/perfume/Yves-Saint-Laurent/Libre-56077.html" },
      { no: 53, brand: "YSL",                name: "Supreme Bouquet",                 link: "https://www.fragrantica.com/perfume/Yves-Saint-Laurent/Supreme-Bouquet-18369.html" }

    var tbody   = document.getElementById('tableBody');
    var input   = document.getElementById('searchInput');
    var counter = document.getElementById('visibleCount');
    var noRes   = document.getElementById('noResults');

    /* ---- Safari-safe SVG icon builder ---- */
    function makeLinkIcon() {
      var ns  = 'http://www.w3.org/2000/svg';
      var svg = document.createElementNS(ns, 'svg');
      svg.setAttribute('width', '10'); svg.setAttribute('height', '10');
      svg.setAttribute('viewBox', '0 0 24 24'); svg.setAttribute('fill', 'none');
      svg.setAttribute('stroke', 'currentColor'); svg.setAttribute('stroke-width', '2.5');
      var path = document.createElementNS(ns, 'path');
      path.setAttribute('d', 'M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6');
      var poly = document.createElementNS(ns, 'polyline');
      poly.setAttribute('points', '15 3 21 3 21 9');
      var line = document.createElementNS(ns, 'line');
      line.setAttribute('x1', '10'); line.setAttribute('y1', '14');
      line.setAttribute('x2', '21'); line.setAttribute('y2', '3');
      svg.appendChild(path); svg.appendChild(poly); svg.appendChild(line);
      return svg;
    }

    /* ---- Safari-safe render (no innerHTML with escaped quotes) ---- */
    function render(list) {
      while (tbody.firstChild) tbody.removeChild(tbody.firstChild);
      noRes.style.display = list.length ? 'none' : 'block';

      list.forEach(function(p, i) {
        var img = imgUrl(p.link);
        var tr  = document.createElement('tr');
        


        /* # */
        var tdNo = document.createElement('td');
        tdNo.textContent = p.no;
        tr.appendChild(tdNo);

        /* Resim */
        var tdImg  = document.createElement('td');
        tdImg.className = 'img-cell';
        var wrap = document.createElement('div');
        wrap.className = 'perf-img-wrap';
        if (img) {
          var im = document.createElement('img');
          im.src = img;
          im.alt = p.name;
          im.loading = 'lazy';
          im.referrerPolicy = 'no-referrer';
          im.onerror = function() {
            var ph = document.createElement('span');
            ph.className = 'img-ph';
            ph.textContent = '—';
            if (im.parentNode) im.parentNode.replaceChild(ph, im);
          };
          wrap.appendChild(im);
        } else {
          var ph0 = document.createElement('span');
          ph0.className = 'img-ph'; ph0.textContent = '—';
          wrap.appendChild(ph0);
        }
        tdImg.appendChild(wrap);
        tr.appendChild(tdImg);

        /* Marka & Ad */
        var tdName   = document.createElement('td');
        var brandSpan = document.createElement('span');
        brandSpan.className = 'brand'; brandSpan.textContent = p.brand;
        var nameSpan  = document.createElement('span');
        nameSpan.className = 'name'; nameSpan.textContent = p.name;
        tdName.appendChild(brandSpan);
        tdName.appendChild(nameSpan);
        tr.appendChild(tdName);

        /* Link */
        var tdLink = document.createElement('td');
        if (p.link) {
          var a = document.createElement('a');
          a.className = 'link-btn';
          a.href = p.link;
          a.target = '_blank';
          a.rel = 'noopener';
          a.appendChild(makeLinkIcon());
          a.appendChild(document.createTextNode('İncele'));
          tdLink.appendChild(a);
        } else {
          var dash = document.createElement('span');
          dash.className = 'no-link'; dash.textContent = '—';
          tdLink.appendChild(dash);
        }
        tr.appendChild(tdLink);

        tbody.appendChild(tr);
      });

      counter.textContent = list.length;
    }

    input.addEventListener('input', function() {
      var q = input.value.toLowerCase().trim();
      render(q ? perfumes.filter(function(p) {
        return p.brand.toLowerCase().indexOf(q) !== -1 ||
               p.name.toLowerCase().indexOf(q)  !== -1;
      }) : perfumes);
    });

    render(perfumes);
  </script>
</body>
