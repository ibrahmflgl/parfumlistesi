<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>Parfüm Koleksiyonu</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0b;
      --surface: #111114;
      --border: #2a2a30;
      --border-light: #3a3a44;
      --gold: #c9a84c;
      --text: #e8e4dc;
      --muted: #7a7880;
      --hover-bg: #1a1a20;
      --stripe: #0e0e12;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      padding: 48px 24px;
    }
    .header { text-align: center; margin-bottom: 52px; }
    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 300;
      letter-spacing: 0.15em;
      margin-bottom: 8px;
    }
    .header h1 em { font-style: italic; color: var(--gold); }
    .header p { color: var(--muted); font-size: 0.78rem; letter-spacing: 0.25em; text-transform: uppercase; }
    .header::after {
      content: '';
      display: block;
      width: 80px; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      margin: 20px auto 0;
    }
    
    .controls {
      max-width: 980px;
      margin: 0 auto 28px;
      display: flex; gap: 16px; align-items: center;
    }
    .filters {
      display: flex; gap: 10px;
    }
    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 16px;
      font-family: 'Jost', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--border-light); color: var(--text); }
    .filter-btn.active { border-color: var(--gold); color: var(--gold); }
    
    .search-wrap { position: relative; flex: 1; }
    .search-wrap svg {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    #searchInput {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-size: 0.85rem; font-weight: 300;
      padding: 10px 16px 10px 40px;
      outline: none; letter-spacing: 0.05em;
      transition: border-color 0.2s;
    }
    #searchInput::placeholder { color: var(--muted); }
    #searchInput:focus { border-color: var(--gold); }
    .count-badge { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.1em; white-space: nowrap; }
    .count-badge span { color: var(--gold); font-weight: 500; }

    .table-wrap {
      max-width: 980px; margin: 0 auto;
      border: 1px solid var(--border); 
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    
    thead tr { background: var(--surface); border-bottom: 1px solid var(--border-light); }
    thead th {
      font-size: 0.63rem; font-weight: 500;
      letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--gold); padding: 13px 14px; text-align: left;
    }
    thead th:first-child  { width: 70px; text-align: center; }
    thead th:last-child   { width: 90px; text-align: right; padding-right: 20px; }
    
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      cursor: pointer;
    }
    tbody tr:nth-child(even) { background: var(--stripe); }
    tbody tr:hover { background: var(--hover-bg); }
    tbody tr:last-child { border-bottom: none; }
    
    td { padding: 8px 14px; vertical-align: middle; }
    td:first-child { width: 70px; text-align: center; padding: 5px 8px; }
    
    .perf-img-wrap {
      width: 50px; height: 66px;
      margin: 0 auto;
      background: #15151a;
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.25s;
    }
    tbody tr:hover .perf-img-wrap { border-color: var(--gold); }
    .perf-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
      display: block;
      transition: transform 0.35s ease;
    }
    tbody tr:hover .perf-img-wrap img { transform: scale(1.08); }
    .img-ph {
      font-size: 0.55rem; color: var(--border-light);
      letter-spacing: 0.05em; line-height: 1.4;
      padding: 4px; text-align: center;
    }
    
    .name {
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem; font-weight: 400; letter-spacing: 0.02em;
      display: inline-block;
      vertical-align: middle;
    }
    .gender-tag {
      font-family: 'Jost', sans-serif;
      font-size: 0.6rem;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 2px;
      margin-left: 10px;
      vertical-align: middle;
      text-transform: uppercase;
      display: inline-block;
    }
    .price {
      color: var(--gold);
      font-size: 0.9rem;
      font-weight: 500;
      text-align: right;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    td:last-child { text-align: right; width: 90px; padding-right: 20px; }
    
    .no-results {
      text-align: center; padding: 48px 20px;
      color: var(--muted); font-size: 0.9rem; display: none;
    }
    .footer {
      max-width: 980px; margin: 22px auto 0;
      display: flex; align-items: center; justify-content: space-between; padding: 0 4px;
    }
    .footer p { font-size: 0.7rem; color: var(--border-light); letter-spacing: 0.1em; }

    @media(max-width:600px) {
      body { padding: 24px 10px; }
      .header h1 { font-size: 2rem; }
      
      .controls { flex-direction: column; align-items: stretch; gap: 12px; }
      .search-wrap { order: 1; }
      .filters { order: 2; flex-wrap: wrap; }
      .filter-btn { flex: 1; text-align: center; padding: 8px 6px; font-size: 0.7rem; }
      .count-badge { order: 3; text-align: center; }

      td { padding: 8px 6px; }
      th { padding: 10px 6px; font-size: 0.55rem; }
      .perf-img-wrap { width: 45px; height: 58px; }
      .name { font-size: 0.95rem; }
      .price { font-size: 0.85rem; }
      td:last-child { padding-right: 12px; }
      thead th:last-child { padding-right: 12px; }
    }
  </style>
</head>

<body>

  <header class="header">
    <h1>Parfüm <em>Koleksiyonu</em></h1>
    <p>Fragrantica Referans Listesi</p>
  </header>

  <div class="controls">
    <div class="filters">
      <button class="filter-btn active" data-gender="all">Tümü</button>
      <button class="filter-btn" data-gender="Erkek">Erkek</button>
      <button class="filter-btn" data-gender="Kadın">Kadın</button>
      <button class="filter-btn" data-gender="Unisex">Unisex</button>
    </div>
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.35-4.35" />
      </svg>
      <input type="text" id="searchInput" placeholder="Parfüm adı ara…">
    </div>
    <div class="count-badge"><span id="visibleCount">53</span> ürün</div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Resim</th>
          <th>Parfüm Adı</th>
          <th>Fiyat 50ml</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="no-results" id="noResults">Sonuç bulunamadı.</div>
  </div>

  <footer class="footer">
    <p>© 2025 Parfüm Koleksiyonu</p>
  </footer>

      { name: "Jean Paul Gaultier Le Male Le Parfum",     link: "https://www.fragrantica.com/perfume/Jean-Paul-Gaultier/Le-Male-Le-Parfum-61856.html", gender: "Erkek" },

      { name: "SHL 777 Sand Dance",                       link: "https://www.fragrantica.com/perfume/Stephane-Humbert-Lucas-777/Sand-Dance-72384.html", gender: "Unisex" },
      { name: "Victoria's Secret Bombshell",              link: "https://www.fragrantica.com/perfume/Victoria-s-Secret/Bombshell-10190.html", gender: "Kadın" },
      { name: "Xerjoff Alexandria II",                    link: "https://www.fragrantica.com/perfume/Xerjoff/Alexandria-II-17786.html", gender: "Unisex" },
      { name: "Xerjoff Apollonia",                        link: "https://www.fragrantica.com/perfume/Xerjoff/Apollonia-55970.html", gender: "Unisex" },
      { name: "Xerjoff Naxos",                            link: "https://www.fragrantica.com/perfume/Xerjoff/XJ-1861-Naxos-30529.html", gender: "Unisex" },
      { name: "YSL Libre",                                link: "https://www.fragrantica.com/perfume/Yves-Saint-Laurent/Libre-56077.html", gender: "Kadın" },
      { name: "YSL Supreme Bouquet",                      link: "https://www.fragrantica.com/perfume/Yves-Saint-Laurent/Supreme-Bouquet-18369.html", gender: "Unisex" }
    ];

    var tbody   = document.getElementById('tableBody');
    var input   = document.getElementById('searchInput');
    var counter = document.getElementById('visibleCount');
    var noRes   = document.getElementById('noResults');
    var filterBtns = document.querySelectorAll('.filter-btn');

    var currentSearch = '';
    var currentGender = 'all';

    function render(list) {
      while (tbody.firstChild) tbody.removeChild(tbody.firstChild);
      noRes.style.display = list.length ? 'none' : 'block';

      list.forEach(function(p) {
        var img = imgUrl(p.link);
        var tr  = document.createElement('tr');
        
        if (p.link) {
          tr.onclick = function() { window.open(p.link, '_blank', 'noopener'); };
        }

        var tdImg  = document.createElement('td');
        var wrap = document.createElement('div');
        wrap.className = 'perf-img-wrap';
        if (img) {
          var im = document.createElement('img');
          im.src = img;
          im.alt = p.name;
          im.loading = 'lazy';
          im.referrerPolicy = 'no-referrer';
          im.onerror = function() {
            var ph = document.createElement('span');
            ph.className = 'img-ph';
            ph.textContent = '—';
            if (im.parentNode) im.parentNode.replaceChild(ph, im);
          };
          wrap.appendChild(im);
        } else {
          var ph0 = document.createElement('span');
          ph0.className = 'img-ph'; ph0.textContent = '—';
          wrap.appendChild(ph0);
        }
        tdImg.appendChild(wrap);
        tr.appendChild(tdImg);

        var tdName   = document.createElement('td');
        var nameSpan  = document.createElement('span');
        nameSpan.className = 'name'; 
        nameSpan.textContent = p.name;
        
        var genderTag = document.createElement('span');
        genderTag.className = 'gender-tag';
        genderTag.textContent = p.gender;

        tdName.appendChild(nameSpan);
        tdName.appendChild(genderTag);
        tr.appendChild(tdName);

        var tdPrice = document.createElement('td');
        tdPrice.className = 'price';
        tdPrice.textContent = p.price || '';
        tr.appendChild(tdPrice);

        tbody.appendChild(tr);
      });

      counter.textContent = list.length;
    }

    function applyFilters() {
      var filtered = perfumes.filter(function(p) {
        var matchSearch = p.name.toLowerCase().indexOf(currentSearch) !== -1;
        var matchGender = currentGender === 'all' || p.gender === currentGender;
        return matchSearch && matchGender;
      });
      render(filtered);
    }

    input.addEventListener('input', function() {
      currentSearch = input.value.toLowerCase().trim();
      applyFilters();
    });

    filterBtns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        filterBtns.forEach(function(b) { b.classList.remove('active'); });
        this.classList.add('active');
        currentGender = this.getAttribute('data-gender');
        applyFilters();
      });
    });

    render(perfumes);
  </script>
</body>
</html>
